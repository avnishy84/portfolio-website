<style>
/* ── Research Papers Page Styles ── */
:root {
    --paper-bg: #f9f6f0;
    --paper-bg-dark: #1a1814;
    --paper-surface: #fffef9;
    --paper-surface-dark: #242018;
    --paper-border: #e8e0d0;
    --paper-border-dark: #3a3428;
    --ink: #2c2416;
    --ink-dark: #e8dcc8;
    --ink-muted: #7a6e5e;
    --ink-muted-dark: #9a8e7e;
    --accent-paper: #8b6914;
    --accent-paper-dark: #d4a843;
    --serif: 'Lora', Georgia, serif;
    --sans: 'Inter', system-ui, sans-serif;
    --page-max: 720px;
    --reading-mode: 0;
}
body.reading-dark {
    --reading-mode: 1;
}

/* ── Base overrides for this page ── */
.rp-page { background: var(--paper-bg); min-height: 100vh; font-family: var(--sans); }
.rp-page.reading-dark { background: var(--paper-bg-dark); }

/* ── Top bar ── */
.rp-topbar {
    position: sticky; top: 0; z-index: 100;
    background: rgba(249,246,240,0.92);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--paper-border);
    padding: 0.75rem 1.5rem;
    display: flex; align-items: center; gap: 1rem;
    transition: background 0.3s;
}
.rp-page.reading-dark .rp-topbar {
    background: rgba(26,24,20,0.92);
    border-color: var(--paper-border-dark);
}
.rp-topbar .back-btn {
    display: flex; align-items: center; gap: 0.4rem;
    color: var(--accent-paper); font-size: 0.85rem; font-weight: 500;
    text-decoration: none; white-space: nowrap;
    transition: opacity 0.2s;
}
.rp-page.reading-dark .rp-topbar .back-btn { color: var(--accent-paper-dark); }
.rp-topbar .back-btn:hover { opacity: 0.7; }
.rp-topbar h1 {
    font-family: var(--sans); font-size: 1rem; font-weight: 600;
    color: var(--ink); flex: 1; margin: 0;
}
.rp-page.reading-dark .rp-topbar h1 { color: var(--ink-dark); }
.rp-topbar .topbar-actions { display: flex; align-items: center; gap: 0.5rem; }
.rp-topbar .icon-btn {
    background: none; border: 1px solid var(--paper-border);
    border-radius: 8px; padding: 0.4rem 0.6rem;
    color: var(--ink-muted); cursor: pointer; font-size: 0.85rem;
    transition: all 0.2s;
}
.rp-page.reading-dark .rp-topbar .icon-btn {
    border-color: var(--paper-border-dark); color: var(--ink-muted-dark);
}
.rp-topbar .icon-btn:hover { background: var(--paper-border); color: var(--ink); }
.rp-page.reading-dark .rp-topbar .icon-btn:hover {
    background: var(--paper-border-dark); color: var(--ink-dark);
}

/* ── Search bar ── */
.rp-search-wrap {
    padding: 1.5rem 1.5rem 0;
    max-width: 900px; margin: 0 auto;
}
.rp-search {
    display: flex; gap: 0.75rem; align-items: center;
    background: var(--paper-surface);
    border: 1px solid var(--paper-border);
    border-radius: 12px; padding: 0.6rem 1rem;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    transition: box-shadow 0.2s;
}
.rp-page.reading-dark .rp-search {
    background: var(--paper-surface-dark);
    border-color: var(--paper-border-dark);
}
.rp-search:focus-within { box-shadow: 0 2px 16px rgba(139,105,20,0.15); }
.rp-search i { color: var(--ink-muted); font-size: 0.9rem; }
.rp-search input {
    border: none; background: none; outline: none; flex: 1;
    font-family: var(--sans); font-size: 0.9rem; color: var(--ink);
}
.rp-page.reading-dark .rp-search input { color: var(--ink-dark); }
.rp-search input::placeholder { color: var(--ink-muted); }
.rp-tags { display: flex; gap: 0.5rem; flex-wrap: wrap; padding: 0.75rem 1.5rem 0; max-width: 900px; margin: 0 auto; }
.rp-tag {
    font-size: 0.75rem; padding: 0.25rem 0.75rem;
    border-radius: 20px; border: 1px solid var(--paper-border);
    background: var(--paper-surface); color: var(--ink-muted);
    cursor: pointer; transition: all 0.2s; font-family: var(--sans);
}
.rp-page.reading-dark .rp-tag {
    border-color: var(--paper-border-dark);
    background: var(--paper-surface-dark); color: var(--ink-muted-dark);
}
.rp-tag.active, .rp-tag:hover {
    background: var(--accent-paper); color: #fff; border-color: var(--accent-paper);
}
.rp-page.reading-dark .rp-tag.active, .rp-page.reading-dark .rp-tag:hover {
    background: var(--accent-paper-dark); color: #1a1814; border-color: var(--accent-paper-dark);
}
</style>
<style>
/* ── Library grid ── */
.rp-library {
    max-width: 900px; margin: 1.5rem auto 3rem;
    padding: 0 1.5rem;
    display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 1.25rem;
}
.paper-card {
    background: var(--paper-surface);
    border: 1px solid var(--paper-border);
    border-radius: 14px;
    padding: 1.5rem;
    cursor: pointer;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06), 0 0 0 0 rgba(139,105,20,0);
    transition: transform 0.25s, box-shadow 0.25s;
    position: relative; overflow: hidden;
}
.rp-page.reading-dark .paper-card {
    background: var(--paper-surface-dark);
    border-color: var(--paper-border-dark);
}
.paper-card::before {
    content: ''; position: absolute; left: 0; top: 0; bottom: 0;
    width: 4px; background: var(--accent-paper); border-radius: 14px 0 0 14px;
    opacity: 0; transition: opacity 0.2s;
}
.rp-page.reading-dark .paper-card::before { background: var(--accent-paper-dark); }
.paper-card:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(0,0,0,0.1); }
.paper-card:hover::before { opacity: 1; }
.paper-card .card-tags { display: flex; gap: 0.4rem; flex-wrap: wrap; margin-bottom: 0.75rem; }
.paper-card .card-tag {
    font-size: 0.68rem; padding: 0.15rem 0.55rem;
    border-radius: 20px; background: rgba(139,105,20,0.1);
    color: var(--accent-paper); font-weight: 500; font-family: var(--sans);
}
.rp-page.reading-dark .paper-card .card-tag {
    background: rgba(212,168,67,0.15); color: var(--accent-paper-dark);
}
.paper-card h2 {
    font-family: var(--serif); font-size: 1.05rem; font-weight: 600;
    color: var(--ink); line-height: 1.4; margin: 0 0 0.5rem;
}
.rp-page.reading-dark .paper-card h2 { color: var(--ink-dark); }
.paper-card .card-authors {
    font-size: 0.78rem; color: var(--ink-muted); margin-bottom: 0.75rem;
    font-family: var(--sans);
}
.rp-page.reading-dark .paper-card .card-authors { color: var(--ink-muted-dark); }
.paper-card .card-abstract {
    font-size: 0.82rem; color: var(--ink-muted); line-height: 1.6;
    display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical;
    overflow: hidden; font-family: var(--serif);
}
.rp-page.reading-dark .paper-card .card-abstract { color: var(--ink-muted-dark); }
.paper-card .card-footer {
    display: flex; align-items: center; justify-content: space-between;
    margin-top: 1rem; padding-top: 0.75rem;
    border-top: 1px solid var(--paper-border);
}
.rp-page.reading-dark .paper-card .card-footer { border-color: var(--paper-border-dark); }
.paper-card .card-year { font-size: 0.75rem; color: var(--ink-muted); font-family: var(--sans); }
.paper-card .read-btn {
    font-size: 0.78rem; color: var(--accent-paper); font-weight: 600;
    font-family: var(--sans); display: flex; align-items: center; gap: 0.3rem;
}
.rp-page.reading-dark .paper-card .read-btn { color: var(--accent-paper-dark); }
.paper-card .bookmark-icon {
    position: absolute; top: 1rem; right: 1rem;
    font-size: 0.85rem; color: var(--paper-border); cursor: pointer;
    transition: color 0.2s;
}
.paper-card .bookmark-icon.saved { color: var(--accent-paper); }
.rp-page.reading-dark .paper-card .bookmark-icon.saved { color: var(--accent-paper-dark); }
.no-results {
    grid-column: 1/-1; text-align: center; padding: 3rem;
    color: var(--ink-muted); font-family: var(--sans); font-size: 0.9rem;
}
</style>
<style>
/* ── Reader view ── */
.rp-reader {
    display: none; position: fixed; inset: 0; z-index: 200;
    background: var(--paper-bg); overflow: hidden;
    flex-direction: column;
}
.rp-reader.open { display: flex; }
.rp-page.reading-dark .rp-reader { background: var(--paper-bg-dark); }

/* Progress bar */
.reading-progress {
    position: fixed; top: 0; left: 0; height: 3px; z-index: 300;
    background: var(--accent-paper); width: 0%; transition: width 0.1s linear;
}
.rp-page.reading-dark .reading-progress { background: var(--accent-paper-dark); }

/* Reader topbar */
.reader-topbar {
    display: flex; align-items: center; gap: 1rem;
    padding: 0.75rem 1.5rem;
    background: rgba(249,246,240,0.95); backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--paper-border);
    flex-shrink: 0; z-index: 10;
}
.rp-page.reading-dark .reader-topbar {
    background: rgba(26,24,20,0.95); border-color: var(--paper-border-dark);
}
.reader-topbar .close-btn {
    background: none; border: none; cursor: pointer;
    color: var(--ink-muted); font-size: 1rem; padding: 0.25rem;
    transition: color 0.2s;
}
.reader-topbar .close-btn:hover { color: var(--ink); }
.rp-page.reading-dark .reader-topbar .close-btn { color: var(--ink-muted-dark); }
.rp-page.reading-dark .reader-topbar .close-btn:hover { color: var(--ink-dark); }
.reader-topbar .reader-title {
    flex: 1; font-family: var(--sans); font-size: 0.85rem;
    font-weight: 500; color: var(--ink-muted);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.rp-page.reading-dark .reader-topbar .reader-title { color: var(--ink-muted-dark); }
.reader-topbar .page-indicator {
    font-size: 0.78rem; color: var(--ink-muted); font-family: var(--sans); white-space: nowrap;
}
.rp-page.reading-dark .reader-topbar .page-indicator { color: var(--ink-muted-dark); }

/* Pages container */
.pages-container {
    flex: 1; overflow-y: auto; scroll-behavior: smooth;
    scroll-snap-type: y mandatory;
    -webkit-overflow-scrolling: touch;
}
.pages-container::-webkit-scrollbar { width: 6px; }
.pages-container::-webkit-scrollbar-track { background: transparent; }
.pages-container::-webkit-scrollbar-thumb { background: var(--paper-border); border-radius: 3px; }

/* Individual page */
.book-page {
    scroll-snap-align: start;
    min-height: 100vh;
    display: flex; justify-content: center; align-items: flex-start;
    padding: 3rem 1.5rem;
    animation: pageReveal 0.5s ease-out both;
}
@keyframes pageReveal {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
}
.page-inner {
    width: 100%; max-width: var(--page-max);
    background: var(--paper-surface);
    border-radius: 4px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08), 0 1px 4px rgba(0,0,0,0.04),
                4px 0 12px rgba(0,0,0,0.04);
    padding: 3rem 3.5rem;
    position: relative;
    border: 1px solid var(--paper-border);
}
.rp-page.reading-dark .page-inner {
    background: var(--paper-surface-dark); border-color: var(--paper-border-dark);
    box-shadow: 0 4px 24px rgba(0,0,0,0.3);
}
/* Subtle page-edge effect */
.page-inner::after {
    content: ''; position: absolute; right: -3px; top: 4px; bottom: 4px;
    width: 3px; background: linear-gradient(to right, rgba(0,0,0,0.06), transparent);
    border-radius: 0 2px 2px 0;
}
.page-number {
    position: absolute; bottom: 1.25rem; right: 2rem;
    font-size: 0.72rem; color: var(--ink-muted); font-family: var(--sans);
}
.rp-page.reading-dark .page-number { color: var(--ink-muted-dark); }

/* Paper typography */
.paper-title-main {
    font-family: var(--serif); font-size: 1.75rem; font-weight: 700;
    color: var(--ink); line-height: 1.3; margin-bottom: 0.75rem;
}
.rp-page.reading-dark .paper-title-main { color: var(--ink-dark); }
.paper-authors-main {
    font-family: var(--sans); font-size: 0.85rem; color: var(--ink-muted);
    margin-bottom: 0.4rem;
}
.rp-page.reading-dark .paper-authors-main { color: var(--ink-muted-dark); }
.paper-meta { display: flex; gap: 1rem; flex-wrap: wrap; margin-bottom: 1.5rem; }
.paper-meta span {
    font-size: 0.75rem; color: var(--ink-muted); font-family: var(--sans);
    display: flex; align-items: center; gap: 0.3rem;
}
.rp-page.reading-dark .paper-meta span { color: var(--ink-muted-dark); }
.paper-divider {
    border: none; border-top: 1px solid var(--paper-border); margin: 1.5rem 0;
}
.rp-page.reading-dark .paper-divider { border-color: var(--paper-border-dark); }
.abstract-label {
    font-family: var(--sans); font-size: 0.7rem; font-weight: 700;
    letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--accent-paper); margin-bottom: 0.5rem;
}
.rp-page.reading-dark .abstract-label { color: var(--accent-paper-dark); }
.abstract-text {
    font-family: var(--serif); font-size: 0.92rem; line-height: 1.8;
    color: var(--ink); font-style: italic;
}
.rp-page.reading-dark .abstract-text { color: var(--ink-dark); }
.section-heading {
    font-family: var(--sans); font-size: 1rem; font-weight: 700;
    color: var(--ink); margin: 2rem 0 0.75rem; letter-spacing: -0.01em;
}
.rp-page.reading-dark .section-heading { color: var(--ink-dark); }
.section-heading.h3 { font-size: 0.88rem; font-weight: 600; margin-top: 1.25rem; }
.body-text {
    font-family: var(--serif); font-size: 0.95rem; line-height: 1.85;
    color: var(--ink); margin-bottom: 1rem;
}
.rp-page.reading-dark .body-text { color: var(--ink-dark); }
.figure-wrap {
    margin: 1.5rem 0; border-radius: 8px; overflow: hidden;
    border: 1px solid var(--paper-border);
    background: var(--paper-bg);
}
.rp-page.reading-dark .figure-wrap {
    border-color: var(--paper-border-dark); background: var(--paper-bg-dark);
}
.figure-wrap img { width: 100%; display: block; loading: lazy; }
.figure-caption {
    font-family: var(--sans); font-size: 0.75rem; color: var(--ink-muted);
    padding: 0.5rem 0.75rem; text-align: center; font-style: italic;
}
.rp-page.reading-dark .figure-caption { color: var(--ink-muted-dark); }
/* Chart placeholder */
.chart-placeholder {
    background: linear-gradient(135deg, rgba(139,105,20,0.06), rgba(139,105,20,0.02));
    border: 1px dashed var(--paper-border); border-radius: 8px;
    padding: 2rem; text-align: center; margin: 1.5rem 0;
    font-family: var(--sans); font-size: 0.8rem; color: var(--ink-muted);
}
.rp-page.reading-dark .chart-placeholder {
    border-color: var(--paper-border-dark); color: var(--ink-muted-dark);
}
.chart-bars { display: flex; align-items: flex-end; gap: 8px; height: 80px; justify-content: center; margin-bottom: 0.5rem; }
.chart-bar { width: 28px; border-radius: 4px 4px 0 0; background: var(--accent-paper); opacity: 0.7; }
.rp-page.reading-dark .chart-bar { background: var(--accent-paper-dark); }
.references-list { list-style: none; padding: 0; margin: 0; }
.references-list li {
    font-family: var(--serif); font-size: 0.82rem; line-height: 1.7;
    color: var(--ink-muted); padding: 0.4rem 0;
    border-bottom: 1px solid var(--paper-border);
}
.rp-page.reading-dark .references-list li {
    color: var(--ink-muted-dark); border-color: var(--paper-border-dark);
}
.references-list li:last-child { border-bottom: none; }
.ref-num { color: var(--accent-paper); font-weight: 600; margin-right: 0.4rem; }
.rp-page.reading-dark .ref-num { color: var(--accent-paper-dark); }

/* Page nav arrows */
.page-nav {
    display: flex; justify-content: space-between; align-items: center;
    padding: 1rem 1.5rem; flex-shrink: 0;
    border-top: 1px solid var(--paper-border);
    background: rgba(249,246,240,0.9);
}
.rp-page.reading-dark .page-nav {
    border-color: var(--paper-border-dark); background: rgba(26,24,20,0.9);
}
.page-nav-btn {
    display: flex; align-items: center; gap: 0.4rem;
    background: none; border: 1px solid var(--paper-border);
    border-radius: 8px; padding: 0.4rem 0.9rem;
    font-family: var(--sans); font-size: 0.8rem; color: var(--ink-muted);
    cursor: pointer; transition: all 0.2s;
}
.rp-page.reading-dark .page-nav-btn {
    border-color: var(--paper-border-dark); color: var(--ink-muted-dark);
}
.page-nav-btn:hover:not(:disabled) {
    background: var(--accent-paper); color: #fff; border-color: var(--accent-paper);
}
.rp-page.reading-dark .page-nav-btn:hover:not(:disabled) {
    background: var(--accent-paper-dark); color: #1a1814; border-color: var(--accent-paper-dark);
}
.page-nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }
.page-dots { display: flex; gap: 6px; }
.page-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--paper-border); cursor: pointer; transition: background 0.2s;
}
.rp-page.reading-dark .page-dot { background: var(--paper-border-dark); }
.page-dot.active { background: var(--accent-paper); }
.rp-page.reading-dark .page-dot.active { background: var(--accent-paper-dark); }

/* Mobile swipe hint */
.swipe-hint {
    text-align: center; font-size: 0.72rem; color: var(--ink-muted);
    font-family: var(--sans); padding: 0.25rem;
    display: none;
}
@media (max-width: 600px) { .swipe-hint { display: block; } }

/* Responsive */
@media (max-width: 768px) {
    .page-inner { padding: 2rem 1.5rem; }
    .paper-title-main { font-size: 1.35rem; }
    .rp-library { grid-template-columns: 1fr; }
}
@media (max-width: 480px) {
    .page-inner { padding: 1.5rem 1.25rem; }
    .book-page { padding: 1rem 0.75rem; }
}
</style>

          <p class="body-text">This paper presents a taxonomy of prompt engineering patterns derived from practical experience building production AI systems. Each pattern addresses a specific failure mode and includes concrete examples of before/after prompt transformations.</p>

    abstract: 'Creational design patterns provide proven solutions to the problem of object creation in object-oriented systems. This paper examines the five canonical creational patterns — Singleton, Factory Method, Abstract Factory, Builder, and Prototype — through the lens of modern software engineering, with practical examples in C# and TypeScript and analysis of when each pattern is appropriate.',

          <p class="body-text">Design patterns are reusable solutions to commonly occurring problems in software design. The creational patterns, first catalogued by the Gang of Four in 1994, address the fundamental challenge of object creation: how to create objects in a manner that is flexible, decoupled, and testable.</p>
          <p class="body-text">Despite being three decades old, these patterns remain highly relevant in modern software development. This paper revisits them through the lens of contemporary practices — dependency injection, unit testing, and functional programming — and provides guidance on when to apply each pattern and when to avoid it.</p>
          <h2 class="section-heading">1. Singleton Pattern</h2>
          <p class="body-text">The Singleton pattern ensures a class has only one instance and provides a global access point to it. It is appropriate for resources that are expensive to create and safe to share — database connection pools, configuration managers, and logging services.</p>
          <p class="body-text">However, Singletons are frequently misused. They introduce hidden global state, make unit testing difficult (the singleton persists across tests), and create tight coupling. In modern systems with dependency injection containers, the Singleton lifetime should be managed by the DI container rather than implemented in the class itself.</p>
          <h2 class="section-heading">2. Factory Method Pattern</h2>
          <p class="body-text">The Factory Method pattern defines an interface for creating objects but lets subclasses decide which class to instantiate. It is the most commonly used creational pattern and is appropriate whenever the exact type of object to create is determined at runtime or varies by context.</p>

          <p class="body-text">The SOLID principles, introduced by Robert C. Martin in the early 2000s, have become the foundational framework for object-oriented software design. They are not rules to be followed mechanically, but heuristics that guide developers toward code that is easier to understand, test, and extend.</p>
          <p class="body-text">This paper examines each principle through the lens of enterprise .NET development, where the consequences of violating these principles — tight coupling, fragile tests, and resistance to change — are felt most acutely in large, long-lived codebases.</p>
          <h2 class="section-heading">1. Single Responsibility Principle (SRP)</h2>
          <p class="body-text">A class should have only one reason to change. In practice, this means a class should encapsulate a single concept or responsibility. The most common violation is the "God class" — a class that handles data access, business logic, validation, and presentation all in one place.</p>
          <p class="body-text">In enterprise .NET systems, SRP is best enforced through a layered architecture: repositories handle data access, services handle business logic, and controllers handle HTTP concerns. Each layer has a single reason to change.</p>
          <h2 class="section-heading">2. Open/Closed Principle (OCP)</h2>
          <p class="body-text">Software entities should be open for extension but closed for modification. New behavior should be added by writing new code, not by modifying existing code. This principle is most naturally implemented through polymorphism and the Strategy pattern.</p>

            <div class="chart-bars">
              <div class="chart-bar" style="height:85%"></div>

              <div class="chart-bar" style="height:75%"></div>
            </div>
            Figure 1: Code change frequency by layer in SOLID-compliant vs. non-compliant systems
          </div>
        `

      {
        heading: '3. LSP, ISP, DIP & References',
        content: `
          <h2 class="section-heading">3. Liskov Substitution Principle (LSP)</h2>
          <p class="body-text">Objects of a superclass should be replaceable with objects of a subclass without altering the correctness of the program. LSP violations are subtle and often manifest as <code>if (obj is SubType)</code> checks in client code — a sign that the subtype is not truly substitutable for the base type.</p>
          <h2 class="section-heading">4. Interface Segregation Principle (ISP)</h2>
          <p class="body-text">Clients should not be forced to depend on interfaces they do not use. Large, monolithic interfaces should be split into smaller, more focused ones. In .NET, this principle is particularly important for repository interfaces: a read-only consumer should not be forced to depend on an interface that includes write methods.</p>
          <h2 class="section-heading">5. Dependency Inversion Principle (DIP)</h2>
          <p class="body-text">High-level modules should not depend on low-level modules. Both should depend on abstractions. This principle is the foundation of dependency injection and is what makes unit testing possible: by depending on interfaces rather than concrete classes, high-level modules can be tested with mock implementations of their dependencies.</p>
          <h2 class="section-heading">6. SOLID in Practice</h2>
          <p class="body-text">Strict adherence to SOLID principles increases the number of classes and interfaces in a system. This is a trade-off, not a flaw. The additional indirection pays dividends in testability, extensibility, and maintainability — particularly in systems that must evolve over years or decades.</p>
          <hr class="paper-divider">
          <div class="abstract-label">References</div>

    authors: ['Avnish Yadav'],
    year: 2023,
    tags: ['Software Engineering', 'Full-Stack'],
    abstract: 'Object-oriented programming (OOP) is the dominant paradigm in enterprise software development, yet its four core concepts — encapsulation, abstraction, inheritance, and polymorphism — are frequently misunderstood or misapplied. This paper revisits these concepts with practical examples from C# and JavaScript, examining how each concept contributes to maintainable, testable production code.',
    pages: [

        heading: null,
        content: `
          <p class="body-text">Object-oriented programming has been the dominant paradigm in enterprise software development for over three decades. Yet despite its ubiquity, the four core OOP concepts — encapsulation, abstraction, inheritance, and polymorphism — are frequently misunderstood, leading to code that is brittle, difficult to test, and resistant to change.</p>
          <p class="body-text">This paper revisits these concepts not as academic abstractions but as practical tools for writing better production code. Each concept is examined through the lens of real-world enterprise development, with examples drawn from C# and JavaScript codebases.</p>
          <h2 class="section-heading">1. Encapsulation</h2>
          <p class="body-text">Encapsulation is the bundling of data and the methods that operate on that data within a single unit, with controlled access to the internal state. The goal is not merely to hide data behind getters and setters, but to ensure that an object's internal state can only be modified through well-defined operations that maintain invariants.</p>
          <p class="body-text">A common encapsulation violation is the anemic domain model — a class that contains only data (public properties) with no behavior, leaving all logic in external service classes. This pattern defeats the purpose of OOP and produces code that is difficult to reason about.</p>
          <h2 class="section-heading">2. Abstraction</h2>
          <p class="body-text">Abstraction is the process of exposing only the essential features of an object while hiding the implementation details. In practice, abstraction is achieved through interfaces and abstract classes that define contracts without specifying implementations.</p>
          <div class="chart-placeholder">
            <div class="chart-bars">
              <div class="chart-bar" style="height:95%"></div>
              <div class="chart-bar" style="height:80%"></div>

          </div>

          <h2 class="section-heading">3. Inheritance</h2>
          <p class="body-text">Inheritance allows a class to inherit properties and methods from a parent class, enabling code reuse and the establishment of type hierarchies. However, inheritance is frequently overused. The maxim "favor composition over inheritance" reflects the observation that deep inheritance hierarchies are brittle — a change to a base class can have unexpected consequences throughout the hierarchy.</p>
          <p class="body-text">Inheritance is appropriate when there is a genuine "is-a" relationship between classes and when the subclass truly extends (rather than overrides) the behavior of the base class. When in doubt, use composition.</p>
          <h2 class="section-heading">4. Polymorphism</h2>
          <p class="body-text">Polymorphism allows objects of different types to be treated as objects of a common type, enabling code that works with abstractions rather than concrete implementations. It is the mechanism that makes the Open/Closed Principle possible: new behavior can be added by creating new implementations of an interface without modifying existing code.</p>
          <p class="body-text">In C#, polymorphism is achieved through virtual methods, abstract classes, and interfaces. In JavaScript, it is achieved through prototype chains and duck typing. Both approaches enable the same fundamental capability: writing code that is decoupled from the specific types it operates on.</p>
          <h2 class="section-heading">5. OOP Anti-Patterns to Avoid</h2>
          <p class="body-text">The most damaging OOP anti-patterns are: the God class (violates SRP), the anemic domain model (defeats encapsulation), deep inheritance hierarchies (creates fragile coupling), and overuse of static methods (prevents polymorphism and testing). Recognizing these patterns in existing code is the first step toward refactoring them.</p>

    authors: ['Avnish Yadav'],
    year: 2025,
    tags: ['Software Engineering', 'Full-Stack', 'AI'],
    abstract: 'Software engineering has evolved dramatically over the past decade, driven by the adoption of agile methodologies, DevOps practices, and AI-assisted development tools. This paper surveys the current state of software engineering practice, examining how modern teams approach requirements, design, implementation, testing, and deployment — and how AI agents are beginning to transform each phase.',
    pages: [

        heading: null,

          <p class="body-text">Software engineering is the systematic application of engineering principles to the development of software. Unlike programming — which focuses on writing code — software engineering encompasses the entire lifecycle: requirements elicitation, system design, implementation, testing, deployment, and maintenance.</p>
          <p class="body-text">This paper surveys the current state of software engineering practice, with particular attention to how modern tools and methodologies have transformed each phase of the development lifecycle. We pay special attention to the emerging role of AI agents in software engineering workflows.</p>
          <h2 class="section-heading">1. Requirements Engineering</h2>
          <p class="body-text">Requirements engineering is the process of defining, documenting, and maintaining requirements. Modern requirements engineering has moved away from heavyweight specification documents toward lightweight, iterative approaches: user stories, acceptance criteria, and behavior-driven development (BDD) scenarios.</p>
          <p class="body-text">The emergence of AI-assisted requirements elicitation represents a significant advance. AI agents can help product owners articulate requirements more precisely, identify ambiguities and contradictions, and generate formal correctness properties that can be validated through automated testing.</p>
          <h2 class="section-heading">2. System Design</h2>
          <p class="body-text">Modern system design emphasizes simplicity, modularity, and evolvability. The microservices architecture, which decomposes a system into small, independently deployable services, has become the dominant pattern for large-scale systems. However, microservices introduce significant operational complexity; the monolith-first approach — starting with a well-structured monolith and extracting services only when necessary — is increasingly recognized as the pragmatic choice for most teams.</p>
          <div class="chart-placeholder">
            <div class="chart-bars">
              <div class="chart-bar" style="height:30%"></div>
              <div class="chart-bar" style="height:50%"></div>
              <div class="chart-bar" style="height:75%"></div>
              <div class="chart-bar" style="height:95%"></div>
            </div>
            Figure 1: Adoption of AI-assisted development tools in software engineering teams (2021–2025)
          </div>
        `

      {
        heading: '3. Testing, Deployment & References',
        content: `
          <h2 class="section-heading">3. Testing Strategy</h2>
          <p class="body-text">The testing pyramid — unit tests at the base, integration tests in the middle, and end-to-end tests at the top — remains the dominant framework for thinking about test strategy. Unit tests are fast, isolated, and provide precise feedback; end-to-end tests are slow and brittle but provide confidence that the system works as a whole.</p>
          <p class="body-text">Property-based testing has emerged as a powerful complement to example-based testing. By generating hundreds of random inputs and verifying that invariants hold across all of them, PBT catches edge cases that human intuition misses. The adoption of PBT in production codebases is growing, driven by tools like fast-check (JavaScript), Hypothesis (Python), and QuickCheck (Haskell).</p>
          <h2 class="section-heading">4. CI/CD and DevOps</h2>
          <p class="body-text">Continuous integration and continuous deployment have become standard practice in modern software engineering. A well-configured CI/CD pipeline catches regressions before they reach production, enables rapid iteration, and reduces the risk of large, infrequent deployments. The key metrics — deployment frequency, lead time for changes, mean time to recovery, and change failure rate — provide a quantitative framework for evaluating DevOps maturity.</p>
          <h2 class="section-heading">5. The AI-Augmented Engineer</h2>
          <p class="body-text">AI-assisted development tools are transforming the role of the software engineer. Rather than replacing engineers, these tools are elevating them: automating routine tasks (boilerplate generation, test writing, documentation), amplifying their capabilities (code review, architecture analysis), and enabling them to focus on higher-order concerns (requirements, design, product strategy).</p>

          </ul>
        `

    year: 2024,
    tags: ['Software Engineering', 'Full-Stack'],
    abstract: 'Chrome Extensions built on Manifest V3 introduce a fundamentally different architecture from their MV2 predecessors. This paper documents the MV3 architecture through the lens of TeamChatLogs — a real-world extension that exports Microsoft Teams chat history — covering the three-layer communication model, virtualized DOM scraping, resilient selector strategies, and a 87-test Jest + fast-check suite.',

          <p class="body-text">Chrome Extensions are one of the most underappreciated platforms in web development. They have direct access to the browser's DOM, network requests, and storage — capabilities that no web application can match. Manifest V3 represents a significant architectural shift that improves security and performance at the cost of increased complexity.</p>
          <p class="body-text">This paper documents the MV3 architecture through the lens of TeamChatLogs — a Chrome Extension that exports full Microsoft Teams chat history to a plain-text file. The extension solves a non-trivial engineering problem: Teams renders its chat using a virtualized list, meaning only the messages currently visible on screen exist in the DOM at any given time.</p>
          <h2 class="section-heading">1. The MV3 Three-Layer Architecture</h2>

          <h2 class="section-heading">2. Solving the Virtualized DOM Problem</h2>
          <p class="body-text">Teams' virtualized list renders only visible messages. The solution is <code>scrollLoadHistory()</code> — incrementally scrolling to the top, waiting for new messages to render, and repeating until the message count stabilizes or a 2-minute timeout is reached.</p>

    abstract: 'Applicant Tracking Systems filter the majority of resumes before a human recruiter sees them. This paper presents the design of a deterministic ATS scoring algorithm and an AI-powered resume rewriting system that optimizes resumes for ATS compatibility without fabricating factual information — implemented in CVio using a weighted 6-category scoring model and GPT-4o with anti-hallucination constraints.',

      {

            Figure 1: ATS scoring category weights
          </div>
          <h2 class="section-heading">2. Keyword Matching</h2>
          <p class="body-text">The keyword matching category tokenizes both resume text and job description, normalizes tokens (lowercase, stemming), and computes the intersection. The score is the ratio of matched job description keywords to total keywords, scaled to 30 points.</p>
        `
      },
      {
        heading: '3. AI Optimization & References',
        content: `
          <h2 class="section-heading">3. Anti-Hallucination AI Optimization</h2>

          <h2 class="section-heading">4. Role-Specific Optimization</h2>

// ── State ────────────────────────────────────────────────────────────────────
let currentPaper = null;
let currentPage = 0;
let activeTag = 'all';
let bookmarks = JSON.parse(localStorage.getItem('rp_bookmarks') || '[]');
let isDark = localStorage.getItem('rp_dark') === '1';

// ── DOM refs ─────────────────────────────────────────────────────────────────
const body = document.body;
const libraryView = document.getElementById('libraryView');
const readerView = document.getElementById('readerView');
const paperGrid = document.getElementById('paperGrid');
const searchInput = document.getElementById('searchInput');
const tagFilters = document.getElementById('tagFilters');
const pagesContainer = document.getElementById('pagesContainer');
const pageIndicator = document.getElementById('pageIndicator');
const pageDots = document.getElementById('pageDots');
const prevBtn = document.getElementById('prevPage');
const nextBtn = document.getElementById('nextPage');
const readerTitle = document.getElementById('readerTitle');
const readingProgress = document.getElementById('readingProgress');
const readerBookmark = document.getElementById('readerBookmark');

// ── Dark mode ─────────────────────────────────────────────────────────────────
function applyDark() {
    if (isDark) body.classList.add('reading-dark');
    else body.classList.remove('reading-dark');
    localStorage.setItem('rp_dark', isDark ? '1' : '0');
}
applyDark();
document.getElementById('darkModeBtn').addEventListener('click', () => { isDark = !isDark; applyDark(); });
document.getElementById('readerDark').addEventListener('click', () => { isDark = !isDark; applyDark(); });

// ── Toast helper ─────────────────────────────────────────────────────────────
function showToast(msg) {
    let toast = document.getElementById('libToast');
    if (!toast) {
        toast = document.createElement('div');
        toast.id = 'libToast';
        toast.style.cssText = 'position:fixed;bottom:2rem;left:50%;transform:translateX(-50%) translateY(20px);background:#2c2416;color:#f9f6f0;font-family:var(--sans);font-size:0.82rem;padding:0.6rem 1.25rem;border-radius:50px;opacity:0;transition:opacity 0.3s,transform 0.3s;pointer-events:none;z-index:999;white-space:nowrap;';
        document.body.appendChild(toast);
    }
    toast.innerHTML = '<i class="fas fa-check" style="margin-right:0.4rem"></i>' + msg;
    toast.style.opacity = '1'; toast.style.transform = 'translateX(-50%) translateY(0)';
    setTimeout(() => { toast.style.opacity = '0'; toast.style.transform = 'translateX(-50%) translateY(20px)'; }, 2500);
}

// ── Render library ────────────────────────────────────────────────────────────
function renderLibrary(papers) {
    paperGrid.innerHTML = '';
    if (!papers.length) {
        paperGrid.innerHTML = '<div class="no-results"><i class="fas fa-book-open" style="font-size:2rem;margin-bottom:0.75rem;display:block;opacity:0.3"></i>No papers found.</div>';
        return;
    }
    papers.forEach(p => {
        const isBookmarked = bookmarks.includes(p.id);
        const card = document.createElement('div');
        card.className = 'paper-card';
        card.setAttribute('tabindex', '0');
        card.setAttribute('role', 'button');
        card.setAttribute('aria-label', `Read ${p.title}`);
        card.innerHTML = `
            <i class="fa${isBookmarked ? 's' : 'r'} fa-bookmark bookmark-icon${isBookmarked ? ' saved' : ''}" data-id="${p.id}" title="Bookmark"></i>
            <div class="card-tags">${p.tags.map(t => `<span class="card-tag">${t}</span>`).join('')}</div>
            <h2>${p.title}</h2>
            <div class="card-authors"><i class="fas fa-user-pen" style="margin-right:0.3rem;font-size:0.7rem"></i>${p.authors.join(', ')}</div>
            <p class="card-abstract">${p.abstract}</p>
            <div class="card-footer">
                <span class="card-year"><i class="fas fa-calendar-alt" style="margin-right:0.3rem"></i>${p.year}</span>
                <div style="display:flex;gap:0.5rem;align-items:center;">
                    <button class="share-card-btn" data-id="${p.id}" data-title="${p.title.replace(/"/g,'&quot;')}" title="Share" aria-label="Share paper" style="background:none;border:1px solid var(--paper-border);border-radius:8px;padding:0.25rem 0.55rem;color:var(--ink-muted);cursor:pointer;font-size:0.75rem;transition:all 0.2s;"><i class="fas fa-share-nodes"></i></button>
                    <span class="read-btn">Read <i class="fas fa-arrow-right"></i></span>
                </div>
            </div>`;
        card.querySelector('.bookmark-icon').addEventListener('click', e => { e.stopPropagation(); toggleBookmark(p.id, card); });
        card.querySelector('.share-card-btn').addEventListener('click', async e => {
            e.stopPropagation();
            const url = `${location.origin}/papers/${p.id}.html`;
            const title = p.title;
            if (navigator.share) { try { await navigator.share({ title, text: 'Research paper by Avnish Yadav, Software Developer', url }); return; } catch(_) {} }
            await navigator.clipboard.writeText(url);
            showToast('Link copied!');
        });
        card.addEventListener('click', () => window.location.href = `papers/${p.id}.html`);
        card.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') window.location.href = `papers/${p.id}.html`; });
        paperGrid.appendChild(card);
    });
}

function toggleBookmark(id, card) {
    const idx = bookmarks.indexOf(id);
    if (idx === -1) bookmarks.push(id); else bookmarks.splice(idx, 1);
    localStorage.setItem('rp_bookmarks', JSON.stringify(bookmarks));
    const icon = card.querySelector('.bookmark-icon');
    const saved = bookmarks.includes(id);
    icon.className = `fa${saved ? 's' : 'r'} fa-bookmark bookmark-icon${saved ? ' saved' : ''}`;
    if (currentPaper && currentPaper.id === id) updateBookmarkBtn();
}

function updateBookmarkBtn() {
    if (!currentPaper) return;
    const saved = bookmarks.includes(currentPaper.id);
    readerBookmark.innerHTML = `<i class="fa${saved ? 's' : 'r'} fa-bookmark"></i>`;
}

// ── Filter & search ───────────────────────────────────────────────────────────
function getFiltered() {
    const q = searchInput.value.toLowerCase().trim();
    return PAPERS.filter(p => {
        const matchTag = activeTag === 'all' || p.tags.includes(activeTag);
        const matchQ = !q || p.title.toLowerCase().includes(q) || p.authors.join(' ').toLowerCase().includes(q) || p.abstract.toLowerCase().includes(q) || p.tags.some(t => t.toLowerCase().includes(q));
        return matchTag && matchQ;
    });
}
searchInput.addEventListener('input', () => renderLibrary(getFiltered()));
tagFilters.addEventListener('click', e => {
    const btn = e.target.closest('.rp-tag');
    if (!btn) return;
    activeTag = btn.dataset.tag;
    tagFilters.querySelectorAll('.rp-tag').forEach(b => b.classList.toggle('active', b === btn));
    renderLibrary(getFiltered());
});

// ── Reader ────────────────────────────────────────────────────────────────────
function openReader(paper) {
    currentPaper = paper;
    currentPage = 0;
    readerTitle.textContent = paper.title;
    updateBookmarkBtn();
    buildPages(paper);
    readerView.classList.add('open');
    document.body.style.overflow = 'hidden';
    scrollToPage(0, false);
    updateNav();
}

function closeReader() {
    readerView.classList.remove('open');
    document.body.style.overflow = '';
    currentPaper = null;
}

document.getElementById('closeReader').addEventListener('click', closeReader);
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeReader(); });

readerBookmark.addEventListener('click', () => {
    if (!currentPaper) return;
    const idx = bookmarks.indexOf(currentPaper.id);
    if (idx === -1) bookmarks.push(currentPaper.id); else bookmarks.splice(idx, 1);
    localStorage.setItem('rp_bookmarks', JSON.stringify(bookmarks));
    updateBookmarkBtn();
    renderLibrary(getFiltered());
});

document.getElementById('readerShare').addEventListener('click', async () => {
    if (!currentPaper) return;
    const url = `${location.origin}/papers/${currentPaper.id}.html`;
    if (navigator.share) { try { await navigator.share({ title: currentPaper.title, text: 'Research paper by Avnish Yadav, Software Developer', url }); return; } catch(_) {} }
    await navigator.clipboard.writeText(url);
    showToast('Link copied!');
});

function buildPages(paper) {
    pagesContainer.innerHTML = '';
    pageDots.innerHTML = '';
    paper.pages.forEach((pg, i) => {
        const div = document.createElement('div');
        div.className = 'book-page';
        div.id = `page-${i}`;
        div.style.animationDelay = `${i * 0.05}s`;
        const inner = document.createElement('div');
        inner.className = 'page-inner';
        if (i === 0) {
            inner.innerHTML = `
                <div class="abstract-label">Research Paper</div>
                <h1 class="paper-title-main">${paper.title}</h1>
                <div class="paper-authors-main"><i class="fas fa-user-pen" style="margin-right:0.4rem;font-size:0.8rem"></i>${paper.authors.join(', ')}</div>
                <div class="paper-meta">
                    <span><i class="fas fa-calendar-alt"></i> ${paper.year}</span>
                    <span><i class="fas fa-tags"></i> ${paper.tags.join(', ')}</span>
                    <span><i class="fas fa-file-alt"></i> ${paper.pages.length} pages</span>
                </div>
                <hr class="paper-divider">
                <div class="abstract-label">Abstract</div>
                <p class="abstract-text">${paper.abstract}</p>
                <hr class="paper-divider">
                ${pg.content}
                <div class="page-number">Page ${i + 1} of ${paper.pages.length}</div>`;
        } else {
            inner.innerHTML = `
                ${pg.heading ? `<h2 class="section-heading">${pg.heading}</h2><hr class="paper-divider">` : ''}
                ${pg.content}
                <div class="page-number">Page ${i + 1} of ${paper.pages.length}</div>`;
        }
        div.appendChild(inner);
        pagesContainer.appendChild(div);

        const dot = document.createElement('button');
        dot.className = 'page-dot' + (i === 0 ? ' active' : '');
        dot.setAttribute('aria-label', `Go to page ${i + 1}`);
        dot.addEventListener('click', () => goToPage(i));
        pageDots.appendChild(dot);
    });
}

function scrollToPage(idx, smooth = true) {
    const pg = document.getElementById(`page-${idx}`);
    if (!pg) return;
    pg.scrollIntoView({ behavior: smooth ? 'smooth' : 'instant', block: 'start' });
}

function goToPage(idx) {
    if (!currentPaper) return;
    currentPage = Math.max(0, Math.min(idx, currentPaper.pages.length - 1));
    scrollToPage(currentPage);
    updateNav();
}

function updateNav() {
    if (!currentPaper) return;
    const total = currentPaper.pages.length;
    pageIndicator.textContent = `Page ${currentPage + 1} of ${total}`;
    prevBtn.disabled = currentPage === 0;
    nextBtn.disabled = currentPage === total - 1;
    pageDots.querySelectorAll('.page-dot').forEach((d, i) => d.classList.toggle('active', i === currentPage));
}

prevBtn.addEventListener('click', () => goToPage(currentPage - 1));
nextBtn.addEventListener('click', () => goToPage(currentPage + 1));

// Keyboard navigation in reader
document.addEventListener('keydown', e => {
    if (!readerView.classList.contains('open')) return;
    if (e.key === 'ArrowRight' || e.key === 'ArrowDown') goToPage(currentPage + 1);
    if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') goToPage(currentPage - 1);
});

// Scroll-based page tracking + progress bar
pagesContainer.addEventListener('scroll', () => {
    if (!currentPaper) return;
    const container = pagesContainer;
    const scrollTop = container.scrollTop;
    const scrollHeight = container.scrollHeight - container.clientHeight;
    const progress = scrollHeight > 0 ? (scrollTop / scrollHeight) * 100 : 0;
    readingProgress.style.width = progress + '%';

    // Detect current page
    const pages = currentPaper.pages;
    for (let i = pages.length - 1; i >= 0; i--) {
        const el = document.getElementById(`page-${i}`);
        if (el && el.offsetTop <= scrollTop + 80) {
            if (currentPage !== i) { currentPage = i; updateNav(); }
            break;
        }
    }
});

// ── Touch swipe for mobile ────────────────────────────────────────────────────
let touchStartX = 0, touchStartY = 0;
pagesContainer.addEventListener('touchstart', e => {
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
}, { passive: true });
pagesContainer.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - touchStartX;
    const dy = e.changedTouches[0].clientY - touchStartY;
    if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 50) {
        if (dx < 0) goToPage(currentPage + 1);
        else goToPage(currentPage - 1);
    }
}, { passive: true });

// ── Init ──────────────────────────────────────────────────────────────────────
renderLibrary(PAPERS);
</script>
</body>
</html>

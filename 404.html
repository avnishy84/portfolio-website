<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 — Page Not Found | Avnish Yadav</title>
    <meta name="description" content="The page you're looking for doesn't exist." />
    <meta name="robots" content="noindex, nofollow" />
    <link rel="icon" href="/images/favicon.ico" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(156deg, #000000 0%, #7e00ff 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #f0f0f0;
            overflow: hidden;
        }

        .starfield { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
        .star {
            position: absolute; border-radius: 50%; background: #fff; opacity: 0;
            animation: twinkle var(--d, 3s) var(--delay, 0s) infinite;
        }
        @keyframes twinkle { 0%,100%{opacity:0} 50%{opacity:var(--op,0.7)} }

        /* ── 404 content ── */
        .container {
            position: relative; z-index: 1; text-align: center;
            padding: 2rem; max-width: 560px; width: 100%;
        }
        .error-code {
            font-size: clamp(6rem, 20vw, 10rem); font-weight: 700; line-height: 1;
            background: linear-gradient(45deg, #667eea, #E0BBE4);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text; letter-spacing: -4px; margin-bottom: 0.5rem;
        }
        .error-icon { font-size: 2.5rem; margin-bottom: 1rem; display: block; }
        h1 { font-size: 1.6rem; font-weight: 600; margin-bottom: 0.75rem; color: #f0f0f0; }
        .subtitle { font-size: 1rem; color: #c7c9d1; line-height: 1.6; margin-bottom: 2rem; }
        .actions { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; }
        .btn {
            display: inline-flex; align-items: center; gap: 0.5rem;
            padding: 0.7rem 1.5rem; border-radius: 50px;
            font-family: 'Inter', sans-serif; font-size: 0.9rem; font-weight: 600;
            text-decoration: none; transition: transform 0.2s, box-shadow 0.2s;
            cursor: pointer; border: none;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(102,126,234,0.35); }
        .btn-primary { background: linear-gradient(45deg, #667eea, #764ba2); color: #fff; }
        .btn-secondary { background: transparent; color: #E0BBE4; border: 1.5px solid #E0BBE4; }
        .btn-secondary:hover { background: rgba(224,187,228,0.1); }
        .btn-game { background: transparent; color: #FFC72C; border: 1.5px solid #FFC72C; }
        .btn-game:hover { background: rgba(255,199,44,0.1); box-shadow: 0 8px 24px rgba(255,199,44,0.2); }
        .divider { width: 60px; height: 2px; background: linear-gradient(90deg,#667eea,#764ba2); margin: 1.5rem auto; border-radius: 2px; }

        /* ── Game overlay ── */
        #game-overlay {
            display: none; position: fixed; inset: 0; z-index: 100;
            background: rgba(0,0,0,0.92); flex-direction: column;
            align-items: center; justify-content: center; gap: 0.75rem;
        }
        #game-overlay.active { display: flex; }

        #game-header {
            display: flex; align-items: center; justify-content: space-between;
            width: min(480px, 92vw); font-size: 0.85rem; color: #c7c9d1;
        }
        #score-display { font-weight: 700; color: #FFC72C; font-size: 1rem; }
        #hi-display { color: #957DAD; }
        #close-game {
            background: none; border: none; color: #c7c9d1; font-size: 1.2rem;
            cursor: pointer; padding: 0.25rem 0.5rem; border-radius: 6px;
            transition: color 0.2s;
        }
        #close-game:hover { color: #fff; }

        #game-canvas {
            border: 1.5px solid rgba(102,126,234,0.4);
            border-radius: 12px;
            display: block;
            background: #050510;
            touch-action: none;
        }

        #game-msg {
            font-size: 0.9rem; color: #c7c9d1; text-align: center;
            min-height: 1.4em; letter-spacing: 0.02em;
        }
        #game-msg span { color: #FFC72C; font-weight: 600; }

        #game-hint {
            font-size: 0.75rem; color: #666; text-align: center;
        }
    </style>
</head>
<body>
<div class="starfield" id="starfield"></div>

<!-- 404 content -->
<div class="container" id="main-content">
    <div class="error-code">404</div>
    <span class="error-icon">🔭</span>
    <h1>Page Not Found</h1>
    <div class="divider"></div>
    <p class="subtitle">Looks like this page drifted off into space.<br>The URL you entered doesn't exist.</p>
    <div class="actions">
        <a href="/" class="btn btn-primary"><i class="fas fa-house"></i> Go Home</a>
        <a href="/research-papers.html" class="btn btn-secondary"><i class="fas fa-book-open"></i> Research Library</a>
        <button class="btn btn-game" id="open-game"><i class="fas fa-gamepad"></i> Play a game?</button>
    </div>
</div>

<!-- Game overlay -->
<div id="game-overlay">
    <div id="game-header">
        <span id="score-display">Score: 0</span>
        <span id="hi-display">Best: 0</span>
        <button id="close-game" title="Close game">✕</button>
    </div>
    <canvas id="game-canvas"></canvas>
    <div id="game-msg"><span>Press Space / Tap</span> to start</div>
    <div id="game-hint">← → Arrow keys or tap left/right to move · Dodge the asteroids 🪨</div>
</div>

<script>
// ── Starfield ──────────────────────────────────────────────────────────────
const sf = document.getElementById('starfield');
for (let i = 0; i < 120; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const size = Math.random() * 2.5 + 0.5;
    s.style.cssText = `width:${size}px;height:${size}px;top:${Math.random()*100}%;left:${Math.random()*100}%;--d:${(Math.random()*4+2).toFixed(1)}s;--delay:${(Math.random()*5).toFixed(1)}s;--op:${(Math.random()*0.6+0.3).toFixed(2)};`;
    sf.appendChild(s);
}

// ── Game ───────────────────────────────────────────────────────────────────
const overlay  = document.getElementById('game-overlay');
const canvas   = document.getElementById('game-canvas');
const ctx      = canvas.getContext('2d');
const scoreEl  = document.getElementById('score-display');
const hiEl     = document.getElementById('hi-display');
const msgEl    = document.getElementById('game-msg');

// Responsive canvas size
function setCanvasSize() {
    const w = Math.min(480, window.innerWidth * 0.92);
    canvas.width  = Math.floor(w);
    canvas.height = Math.floor(w * 1.1);
}
setCanvasSize();
window.addEventListener('resize', () => { setCanvasSize(); if (!running) drawIdle(); });

// Game state
let running = false, over = false, raf = null;
let score = 0, hiScore = parseInt(localStorage.getItem('404_hi') || '0');
let frameCount = 0;

// Ship
const SHIP_H = () => canvas.height * 0.08;
const SHIP_W = () => SHIP_H() * 0.7;
let ship = { x: 0, y: 0, vx: 0 };

// Asteroids
let asteroids = [];
let particles = [];

// Input
const keys = { left: false, right: false };

function resetGame() {
    score = 0; frameCount = 0;
    ship.x = canvas.width / 2;
    ship.y = canvas.height - SHIP_H() * 1.8;
    ship.vx = 0;
    asteroids = [];
    particles = [];
    hiEl.textContent = 'Best: ' + hiScore;
}

// ── Drawing helpers ────────────────────────────────────────────────────────
function drawShip(x, y, w, h, thrust) {
    ctx.save();
    ctx.translate(x, y);

    // Engine glow
    if (thrust) {
        const g = ctx.createRadialGradient(0, h*0.4, 0, 0, h*0.4, h*0.5);
        g.addColorStop(0, 'rgba(255,180,50,0.9)');
        g.addColorStop(1, 'rgba(255,80,0,0)');
        ctx.fillStyle = g;
        ctx.beginPath();
        ctx.ellipse(0, h*0.35, w*0.25, h*0.45, 0, 0, Math.PI*2);
        ctx.fill();
    }

    // Body gradient
    const bg = ctx.createLinearGradient(-w/2, -h/2, w/2, h/2);
    bg.addColorStop(0, '#a78bfa');
    bg.addColorStop(1, '#667eea');
    ctx.fillStyle = bg;
    ctx.beginPath();
    ctx.moveTo(0, -h/2);
    ctx.lineTo(w/2, h/2);
    ctx.lineTo(0, h*0.3);
    ctx.lineTo(-w/2, h/2);
    ctx.closePath();
    ctx.fill();

    // Cockpit
    ctx.fillStyle = 'rgba(200,230,255,0.85)';
    ctx.beginPath();
    ctx.ellipse(0, -h*0.1, w*0.18, h*0.2, 0, 0, Math.PI*2);
    ctx.fill();

    ctx.restore();
}

function drawAsteroid(a) {
    ctx.save();
    ctx.translate(a.x, a.y);
    ctx.rotate(a.rot);
    ctx.fillStyle = a.color;
    ctx.strokeStyle = 'rgba(255,255,255,0.15)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    for (let i = 0; i < a.pts.length; i++) {
        const p = a.pts[i];
        i === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y);
    }
    ctx.closePath();
    ctx.fill();
    ctx.stroke();
    ctx.restore();
}

function makeAsteroid() {
    const r = (canvas.width * 0.03) + Math.random() * (canvas.width * 0.045);
    const pts = [];
    const n = 7 + Math.floor(Math.random() * 4);
    for (let i = 0; i < n; i++) {
        const angle = (i / n) * Math.PI * 2;
        const dist  = r * (0.7 + Math.random() * 0.5);
        pts.push({ x: Math.cos(angle) * dist, y: Math.sin(angle) * dist });
    }
    const speed = (canvas.height * 0.003) + Math.random() * (canvas.height * 0.004) + (score * 0.0008);
    const colors = ['#8b7355','#a0856c','#6b5a45','#c4a882','#7a6248'];
    return {
        x: r + Math.random() * (canvas.width - r * 2),
        y: -r,
        r, pts, speed,
        rot: 0, rotSpeed: (Math.random() - 0.5) * 0.06,
        color: colors[Math.floor(Math.random() * colors.length)]
    };
}

function spawnParticles(x, y) {
    for (let i = 0; i < 18; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = 1 + Math.random() * 4;
        particles.push({
            x, y,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed,
            life: 1,
            color: ['#FFC72C','#ff6b35','#a78bfa','#fff'][Math.floor(Math.random()*4)],
            size: 2 + Math.random() * 3
        });
    }
}

function drawParticles() {
    particles.forEach(p => {
        ctx.globalAlpha = p.life;
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
        ctx.fill();
    });
    ctx.globalAlpha = 1;
}

function drawHUD() {
    // Score
    ctx.fillStyle = '#FFC72C';
    ctx.font = `bold ${canvas.width * 0.045}px Inter, sans-serif`;
    ctx.textAlign = 'left';
    ctx.fillText('Score: ' + score, 12, canvas.width * 0.055);
}

function drawIdle() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    // Subtle grid
    ctx.strokeStyle = 'rgba(102,126,234,0.07)';
    ctx.lineWidth = 1;
    const step = canvas.width / 8;
    for (let x = 0; x < canvas.width; x += step) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,canvas.height); ctx.stroke(); }
    for (let y = 0; y < canvas.height; y += step) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(canvas.width,y); ctx.stroke(); }
    drawShip(canvas.width/2, canvas.height - SHIP_H()*1.8, SHIP_W(), SHIP_H(), false);
}

// ── Game loop ──────────────────────────────────────────────────────────────
function loop() {
    if (!running) return;
    frameCount++;

    // Move ship
    const ACCEL = canvas.width * 0.0035;
    const FRICTION = 0.82;
    const MAX_VX = canvas.width * 0.025;
    if (keys.left)  ship.vx -= ACCEL;
    if (keys.right) ship.vx += ACCEL;
    ship.vx *= FRICTION;
    ship.vx = Math.max(-MAX_VX, Math.min(MAX_VX, ship.vx));
    ship.x += ship.vx;
    ship.x = Math.max(SHIP_W()/2, Math.min(canvas.width - SHIP_W()/2, ship.x));

    // Spawn asteroids
    const spawnRate = Math.max(28, 55 - Math.floor(score / 8));
    if (frameCount % spawnRate === 0) asteroids.push(makeAsteroid());

    // Update asteroids
    asteroids.forEach(a => { a.y += a.speed; a.rot += a.rotSpeed; });
    asteroids = asteroids.filter(a => a.y < canvas.height + a.r * 2);

    // Update particles
    particles.forEach(p => { p.x += p.vx; p.y += p.vy; p.vy += 0.1; p.life -= 0.035; });
    particles = particles.filter(p => p.life > 0);

    // Score
    if (frameCount % 6 === 0) score++;
    scoreEl.textContent = 'Score: ' + score;

    // Collision
    const sw = SHIP_W() * 0.38, sh = SHIP_H() * 0.38;
    for (const a of asteroids) {
        const dx = Math.abs(a.x - ship.x), dy = Math.abs(a.y - ship.y);
        if (dx < a.r * 0.7 + sw && dy < a.r * 0.7 + sh) {
            spawnParticles(ship.x, ship.y);
            endGame();
            return;
        }
    }

    // Draw
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    asteroids.forEach(drawAsteroid);
    drawParticles();
    drawShip(ship.x, ship.y, SHIP_W(), SHIP_H(), keys.left || keys.right);
    drawHUD();

    raf = requestAnimationFrame(loop);
}

function startGame() {
    resetGame();
    running = true; over = false;
    msgEl.innerHTML = '';
    raf = requestAnimationFrame(loop);
}

function endGame() {
    running = false; over = true;
    cancelAnimationFrame(raf);
    if (score > hiScore) {
        hiScore = score;
        localStorage.setItem('404_hi', hiScore);
        hiEl.textContent = 'Best: ' + hiScore;
        msgEl.innerHTML = '🏆 New best: <span>' + score + '</span>! Press Space / Tap to retry';
    } else {
        msgEl.innerHTML = 'Score: <span>' + score + '</span> · Press Space / Tap to retry';
    }
    // Draw explosion frame
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    asteroids.forEach(drawAsteroid);
    drawParticles();
    drawHUD();
}

// ── Controls ───────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
    if (!overlay.classList.contains('active')) return;
    if (e.code === 'ArrowLeft')  keys.left  = true;
    if (e.code === 'ArrowRight') keys.right = true;
    if ((e.code === 'Space' || e.code === 'Enter') && !running) {
        e.preventDefault(); startGame();
    }
});
document.addEventListener('keyup', e => {
    if (e.code === 'ArrowLeft')  keys.left  = false;
    if (e.code === 'ArrowRight') keys.right = false;
});

// Touch controls
let touchStartX = null;
canvas.addEventListener('touchstart', e => {
    e.preventDefault();
    touchStartX = e.touches[0].clientX;
    if (!running) startGame();
}, { passive: false });
canvas.addEventListener('touchmove', e => {
    e.preventDefault();
    if (!running || touchStartX === null) return;
    const dx = e.touches[0].clientX - touchStartX;
    keys.left  = dx < -8;
    keys.right = dx > 8;
}, { passive: false });
canvas.addEventListener('touchend', e => {
    e.preventDefault();
    keys.left = keys.right = false;
    touchStartX = null;
}, { passive: false });

// Click to start (desktop)
canvas.addEventListener('click', () => { if (!running) startGame(); });

// ── Open / Close ───────────────────────────────────────────────────────────
document.getElementById('open-game').addEventListener('click', () => {
    overlay.classList.add('active');
    hiEl.textContent = 'Best: ' + hiScore;
    setCanvasSize();
    resetGame();
    drawIdle();
    msgEl.innerHTML = '<span>Press Space / Tap</span> to start';
});

document.getElementById('close-game').addEventListener('click', () => {
    overlay.classList.remove('active');
    running = false;
    cancelAnimationFrame(raf);
    keys.left = keys.right = false;
});

// Close on Escape
document.addEventListener('keydown', e => {
    if (e.code === 'Escape' && overlay.classList.contains('active')) {
        overlay.classList.remove('active');
        running = false;
        cancelAnimationFrame(raf);
    }
});
</script>
</body>
</html>
